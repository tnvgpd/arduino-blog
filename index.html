<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Portfolio & Blog</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Load our dynamic scripts -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</head>
<body>

  <!-- NAVBAR SECTION -->
  <nav class="navbar">
    <div class="nav-brand">Student Engineer</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <!-- HOME SECTION -->
  <header id="home" class="section hero">
    <div class="hero-content">
      <h1 class="hero-title">Tanvi's Engineering Journey</h1>
      <p class="hero-subtitle" id="typewriter-text" style="min-height: 2em;">
        <span class="type-main"></span><span class="cursor">|</span>
      </p>
      <a href="projects.html" class="btn">View My Work</a>
    </div>
  </header>

  <!-- FEATURED PROJECTS SECTION -->
  <section id="projects" class="section bg-light">
    <div class="container">
      <h2 class="section-title">Featured Projects</h2>
      
      <!-- Container injected by script.js -->
      <div id="featured-projects" class="projects-grid"></div>
      
      <div style="text-align: center; margin-top: 3rem;">
        <a href="projects.html" class="btn">View All Projects</a>
      </div>
    </div>
  </section>

  <!-- FEATURED BLOG SECTION -->
  <section id="blog" class="section">
    <div class="container">
      <h2 class="section-title">Latest Blog Post</h2>
      
      <!-- Container injected by script.js -->
      <div id="featured-blogs" class="blog-container"></div>
      
      <div style="text-align: center; margin-top: 3rem;">
        <a href="blog.html" class="btn">View All Blog Posts</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2023 Student Engineering Portfolio. Built with plain HTML, CSS, and JS.</p>
    </div>
  </footer>

</body>
</html>
